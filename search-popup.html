<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSH Research Discovery Portal</title>
<style>
  body{font-family:system-ui,-apple-system,sans-serif;background:#f4f3ef;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;flex-direction:column;gap:12px}
  .demo-label{font-size:13px;color:#888}
</style>
</head>
<body>
<div class="demo-label">SSH Research Discovery Portal</div>
<button onclick="SSHPortal.open()" style="padding:10px 22px;background:#534AB7;color:#EEEDFE;
  border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit">
  Search research sources
</button>

<style>
#sshp-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;
  align-items:center;justify-content:center;padding:1rem}
#sshp-ov.open{display:flex}
#sshp-m{background:#fff;border-radius:14px;width:100%;max-width:660px;
  border:.5px solid #d8d6cc;overflow:hidden;max-height:90vh;display:flex;flex-direction:column}
.sh{padding:1rem 1.4rem;border-bottom:.5px solid #e8e6df;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.st{font-size:15px;font-weight:500;display:flex;align-items:center;gap:8px}
.sbadge{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:500;background:#EEEDFE;color:#3C3489}
.scl{background:none;border:none;font-size:18px;cursor:pointer;color:#888;padding:4px}
.scl:hover{color:#333}
.stabs{display:flex;border-bottom:.5px solid #e8e6df;flex-shrink:0;background:#fafaf8}
.stab{flex:1;padding:9px 4px;font-size:12px;font-weight:500;text-align:center;cursor:pointer;
  border:none;background:none;color:#999;font-family:inherit;border-bottom:2px solid transparent;transition:all .15s}
.stab:hover{color:#534AB7}
.stab.active{color:#534AB7;border-bottom-color:#534AB7;background:#fff}
.stab span{display:block;font-size:15px;margin-bottom:1px}
.sbody{padding:1rem 1.4rem;overflow-y:auto;flex:1}
.srow{display:flex;gap:8px;margin-bottom:10px}
#sshp-q{flex:1;padding:8px 12px;border:.5px solid #ccc;border-radius:8px;font-size:14px;font-family:inherit;outline:none}
#sshp-q:focus{border-color:#7F77DD}
.sbtn{padding:8px 16px;background:#534AB7;color:#EEEDFE;border:none;border-radius:8px;
  font-size:13px;cursor:pointer;font-family:inherit}
.sbtn:hover{background:#3C3489}
.sbtn:disabled{opacity:.5;cursor:not-allowed}
.spills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.spill{font-size:11px;padding:3px 8px;border-radius:4px;font-weight:500}
.p0{background:#EEEDFE;color:#3C3489}
.p1{background:#FAEEDA;color:#633806}
.p2{background:#E6F1FB;color:#0C447C}
.p3{background:#FCEBEB;color:#791F1F}
.p4{background:#E1F5EE;color:#085041}
.sload{text-align:center;padding:1.2rem;color:#999;font-size:13px;display:none}
.sprogw{height:2px;background:#e0ded7;border-radius:2px;overflow:hidden;margin:6px 0 0}
.sprog{height:100%;background:#534AB7;border-radius:2px;transition:width .4s}
.sstat{font-size:12px;color:#999;margin-bottom:8px}
.sres{display:flex;flex-direction:column;gap:8px}
.scard{border:.5px solid #e0ded7;border-radius:10px;padding:11px 13px;background:#fff;transition:border-color .15s}
.scard:hover{border-color:#7F77DD}
.sct{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px}
.scn{font-size:13px;font-weight:500;color:#1a1a1a;line-height:1.4}
.scm{font-size:11px;color:#999;margin-top:2px}
.scd{font-size:12px;color:#666;line-height:1.5;margin-bottom:7px}
.scf{display:flex;gap:5px;flex-wrap:wrap}
.sa{padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;
  border:.5px solid #ccc;background:#f9f8f5;color:#333;font-family:inherit;
  text-decoration:none;display:inline-block;transition:all .15s}
.sa:hover{background:#EEEDFE;color:#3C3489;border-color:#AFA9EC}
.saL{background:#534AB7;color:#EEEDFE;border-color:#534AB7}
.saL:hover{background:#3C3489;color:#EEEDFE}
.sempty{text-align:center;padding:2rem;color:#aaa;font-size:13px;line-height:1.7}
.shint{font-size:12px;color:#aaa;line-height:1.6;padding:1rem;
  background:#f9f8f5;border-radius:8px;border:.5px solid #e8e6df}
.sfooter{padding:.8rem 1.4rem;border-top:.5px solid #e8e6df;
  font-size:11px;color:#aaa;flex-shrink:0;display:flex;justify-content:space-between}
</style>

<div id="sshp-ov">
  <div id="sshp-m" role="dialog" aria-label="SSH Research Discovery Portal">
    <div class="sh">
      <div class="st">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="6.5" cy="6.5" r="4.5" stroke="#534AB7" stroke-width="1.2"/>
          <path d="M10 10l3 3" stroke="#534AB7" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        SSH research discovery portal
        <span class="sbadge">5 sources</span>
      </div>
      <button class="scl" onclick="SSHPortal.close()">&#x2715;</button>
    </div>

    <div class="stabs">
      <button class="stab active" id="tab-tools" onclick="SSHPortal.tab('tools')"><span>&#128295;</span>Tools</button>
      <button class="stab" id="tab-archives" onclick="SSHPortal.tab('archives')"><span>&#127963;</span>Archives</button>
      <button class="stab" id="tab-literature" onclick="SSHPortal.tab('literature')"><span>&#128218;</span>Literature</button>
      <button class="stab" id="tab-data" onclick="SSHPortal.tab('data')"><span>&#128202;</span>Research data</button>
    </div>

    <div class="sbody">
      <div class="srow">
        <input type="text" id="sshp-q" placeholder="Search…"
          onkeydown="if(event.key==='Enter')SSHPortal.search()"/>
        <button class="sbtn" id="sshp-sb" onclick="SSHPortal.search()">Search</button>
      </div>
      <div class="spills" id="sshp-pills"></div>
      <div class="sload" id="sshp-load">
        Searching…
        <div class="sprogw"><div class="sprog" id="sshp-pb" style="width:0%"></div></div>
      </div>
      <div class="sstat" id="sshp-stat"></div>
      <div class="sres" id="sshp-res"></div>
    </div>

    <div class="sfooter">
      <span id="sshp-fl">Select a tab and search</span>
      <span>Europeana · Zenodo · Gutenberg · DANS · GitHub</span>
    </div>
  </div>
</div>

<script>
const EK = 'borewashropp';
const REPOS = [
  'georginagianni/text-analysis-demo','proycon/codemetapy',
  'proycon/codemeta-server','citation-file-format/cff-converter-python','CLARIAH/tool-discovery'
];
const TABS = {
  tools:      {pills:[['GitHub registry','p0']]},
  archives:   {pills:[['Europeana','p1'],['DANS EASY','p2']]},
  literature: {pills:[['Project Gutenberg','p3']]},
  data:       {pills:[['Zenodo','p4']]},
};
const HINTS = {
  tools:'Search tools by name, language, or domain. All tools can launch directly in Binder.',
  archives:'Search 50M+ cultural heritage objects from Europeana and Dutch datasets from DANS EASY.',
  literature:'Search 70,000+ free ebooks from Project Gutenberg by title, author, or subject.',
  data:'Search research datasets, software, and publications archived on Zenodo.',
};

let curTab='tools', cache=null;

const SSHPortal={
  open(){
    document.getElementById('sshp-ov').classList.add('open');
    document.getElementById('sshp-q').focus();
    this.tab('tools',true);
  },
  close(){ document.getElementById('sshp-ov').classList.remove('open'); },
  tab(t,force){
    if(t===curTab&&!force)return;
    curTab=t;
    document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));
    document.getElementById('tab-'+t).classList.add('active');
    document.getElementById('sshp-q').value='';
    document.getElementById('sshp-res').innerHTML=`<div class="shint">${HINTS[t]}</div>`;
    document.getElementById('sshp-stat').textContent='';
    document.getElementById('sshp-pills').innerHTML=
      TABS[t].pills.map(([l,c])=>`<span class="spill ${c}">${l}</span>`).join('');
    if(t==='tools'&&!cache)this.loadTools();
    else if(t==='tools'&&cache)this.renderTools('');
  },
  async search(){
    const q=document.getElementById('sshp-q').value.trim();
    if(!q)return;
    document.getElementById('sshp-sb').disabled=true;
    this.loading(true);
    try{
      if(curTab==='tools')     await this.searchTools(q);
      if(curTab==='archives')  await this.searchArchives(q);
      if(curTab==='literature')await this.searchLit(q);
      if(curTab==='data')      await this.searchData(q);
    }catch(e){ this.err('Search failed. Please try again.'); }
    this.loading(false);
    document.getElementById('sshp-sb').disabled=false;
  },

  async loadTools(){
    this.loading(true);
    const pb=document.getElementById('sshp-pb');
    const ms=[];
    for(let i=0;i<REPOS.length;i++){
      pb.style.width=Math.round(i/REPOS.length*90)+'%';
      const m=await fetchMeta(REPOS[i]);
      if(m)ms.push(m);
    }
    pb.style.width='100%';
    cache=ms;
    this.loading(false);
    this.renderTools('');
  },
  async searchTools(q){
    if(!cache)await this.loadTools();
    else this.renderTools(q);
  },
  renderTools(q){
    const fl=cache.filter(t=>{
      const h=[t.name,t.description,
        normL(t.programmingLanguage).join(' '),
        normK(t.keywords||[]).join(' ')].join(' ').toLowerCase();
      return !q||h.includes(q.toLowerCase());
    });
    document.getElementById('sshp-stat').textContent=
      q?`${fl.length} tools matching "${q}"`:
        `${fl.length} tools indexed`;
    document.getElementById('sshp-fl').textContent=`${fl.length} tools`;
    if(!fl.length){
      document.getElementById('sshp-res').innerHTML=
        `<div class="sempty">No tools found for "${q}".</div>`;return;
    }
    document.getElementById('sshp-res').innerHTML=fl.map(t=>{
      const langs=normL(t.programmingLanguage);
      const bu=binderU(t);
      const repo=t.codeRepository||`https://github.com/${t._r}`;
      return `<div class="scard">
        <div class="sct">
          <div><div class="scn">${t.name||t._r}</div>
          <div class="scm">${langs.join(',')||'—'} · v${t.version||'—'}</div></div>
          <span class="spill p0">GitHub</span>
        </div>
        <div class="scd">${(t.description||'').slice(0,160)}${(t.description||'').length>160?'…':''}</div>
        <div class="scf">
          <a class="sa" href="${repo}" target="_blank">GitHub</a>
          ${bu?`<a class="sa saL" href="${bu}" target="_blank">Launch in Binder</a>`:''}
          <button class="sa" onclick="SSHPortal.downloadAnsible('${t._r}',event)">Download Ansible playbook</button>
        </div></div>`;
    }).join('');
  },

  async searchArchives(q){
    const [eu,dans]=await Promise.allSettled([searchEuropeana(q),searchDANS(q)]);
    this.renderCards([
      ...(eu.status==='fulfilled'?eu.value:[]),
      ...(dans.status==='fulfilled'?dans.value:[]),
    ],q);
  },
  async searchLit(q){
    this.renderCards(await searchGutenberg(q),q);
  },
  async searchData(q){
    this.renderCards(await searchZenodo(q),q);
  },

  renderCards(items,q){
    const pill={
      'Europeana':'p1','DANS EASY':'p2',
      'Project Gutenberg':'p3','Zenodo':'p4'
    };
    document.getElementById('sshp-stat').textContent=`${items.length} results for "${q}"`;
    document.getElementById('sshp-fl').textContent=`${items.length} results`;
    if(!items.length){
      document.getElementById('sshp-res').innerHTML=
        `<div class="sempty">No results for "${q}".<br>Try different keywords.</div>`;return;
    }
    document.getElementById('sshp-res').innerHTML=items.map(r=>`
      <div class="scard">
        <div class="sct">
          <div><div class="scn">${r.title}</div>
          <div class="scm">${r.meta||''}</div></div>
          <span class="spill ${pill[r.source]||'p0'}">${r.source}</span>
        </div>
        <div class="scd">${(r.desc||'').replace(/<[^>]+>/g,'').slice(0,180)}${(r.desc||'').length>180?'…':''}</div>
        <div class="scf">
          <a class="sa" href="${r.url}" target="_blank">View</a>
          ${r.dl?`<a class="sa" href="${r.dl}" target="_blank">Download</a>`:''}
        </div></div>`).join('');
  },

  loading(on){
    document.getElementById('sshp-load').style.display=on?'block':'none';
    if(on)document.getElementById('sshp-pb').style.width='30%';
  },
  err(m){
    document.getElementById('sshp-res').innerHTML=`<div class="sempty">${m}</div>`;
  }
};

async function fetchMeta(repo){
  for(const b of['main','master']){
    try{
      const r=await fetch(`https://raw.githubusercontent.com/${repo}/${b}/codemeta.json`);
      if(r.ok){const m=await r.json();m._r=repo;return m;}
    }catch(e){}
  }
  try{
    const r=await fetch(`https://api.github.com/repos/${repo}`);
    if(r.ok){const d=await r.json();
      return{name:d.name,description:d.description||'',version:'—',
        programmingLanguage:d.language?[{name:d.language}]:[],
        codeRepository:d.html_url,keywords:[],_r:repo};}
  }catch(e){}
  return null;
}

async function searchEuropeana(q){
  try{
    const r=await fetch(`https://api.europeana.eu/record/v2/search.json?query=${encodeURIComponent(q)}&rows=5&profile=minimal&wskey=${EK}`);
    const d=await r.json();
    return(d.items||[]).map(i=>({
      title:Array.isArray(i.title)?i.title[0]:(i.title||'Untitled'),
      desc:Array.isArray(i.dcDescription)?i.dcDescription[0]:'',
      meta:Array.isArray(i.dataProvider)?i.dataProvider[0]:'',
      url:`https://www.europeana.eu/item${i.id}`,
      source:'Europeana'
    }));
  }catch(e){return[];}
}

async function searchDANS(q){
  try{
    const r=await fetch(`https://easy.dans.knaw.nl/solr/search?q=${encodeURIComponent(q)}&rows=4&wt=json`);
    const d=await r.json();
    return(d.response?.docs||[]).map(doc=>({
      title:doc.dc_title?.[0]||'Untitled',
      desc:doc.dc_description?.[0]||'',
      meta:doc.dc_creator?.[0]||'',
      url:`https://easy.dans.knaw.nl/ui/datasets/id/${doc.sid}`,
      source:'DANS EASY'
    }));
  }catch(e){return[];}
}

async function searchGutenberg(q){
  try{
    const r=await fetch(`https://gutendex.com/books?search=${encodeURIComponent(q)}`);
    const d=await r.json();
    return(d.results||[]).slice(0,6).map(b=>({
      title:b.title,
      desc:`By ${b.authors.map(a=>a.name).join(', ')||'Unknown'}. Languages: ${b.languages.join(', ')}.`,
      meta:`${(b.download_count||0).toLocaleString()} downloads`,
      url:`https://www.gutenberg.org/ebooks/${b.id}`,
      dl:b.formats?.['text/html']||b.formats?.['application/epub+zip']||'',
      source:'Project Gutenberg'
    }));
  }catch(e){return[];}
}

async function searchZenodo(q){
  try{
    const r=await fetch(`https://zenodo.org/api/records?q=${encodeURIComponent(q)}&size=6&sort=mostrecent`);
    const d=await r.json();
    return(d.hits?.hits||[]).map(rec=>({
      title:rec.metadata?.title||'Untitled',
      desc:rec.metadata?.description||'',
      meta:`${rec.metadata?.creators?.[0]?.name||''} · ${rec.metadata?.publication_date||''}`,
      url:rec.links?.html||`https://zenodo.org/record/${rec.id}`,
      source:'Zenodo'
    }));
  }catch(e){return[];}
}

function normL(raw){
  if(!raw)return[];
  return(Array.isArray(raw)?raw:[raw]).map(l=>typeof l==='string'?l:l?.name||'').filter(Boolean);
}
function normK(raw){
  if(!raw)return[];
  return Array.isArray(raw)?raw:raw.split(',').map(k=>k.trim());
}
function binderU(m){
  const r=m.codeRepository||'';
  if(!r.includes('github.com'))return null;
  const p=r.replace(/\/$/,'').split('/');
  return`https://mybinder.org/v2/gh/${p[p.length-2]}/${p[p.length-1]}/HEAD`;
}

document.getElementById('sshp-ov').addEventListener('click',e=>{
  if(e.target.id==='sshp-ov')SSHPortal.close();
});

// ── Ansible playbook generator ──
SSHPortal.downloadAnsible = async function(repo, event) {
  event.stopPropagation();
  const btn = event.target;
  btn.textContent = 'Generating...';
  btn.disabled = true;

  const meta = await fetchMeta(repo);
  if (!meta) { btn.textContent = 'Failed'; return; }

  const playbook = generatePlaybook(meta);
  const blob = new Blob([playbook], {type: 'text/yaml'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'playbook.yml';
  a.click();
  URL.revokeObjectURL(url);

  btn.textContent = 'Downloaded!';
  setTimeout(() => { btn.textContent = 'Download Ansible playbook'; btn.disabled = false; }, 2000);
};

function generatePlaybook(meta) {
  const name = meta.name || meta._r || 'research-tool';
  const safe = name.toLowerCase().replace(/[^a-z0-9]/g, '_');
  const version = meta.version || 'latest';
  const repo = meta.codeRepository || '';
  const lang = normL(meta.programmingLanguage)[0] || 'Python';
  const desc = (meta.description || '').slice(0, 80);

  const skip = new Set(['jupyter','ipykernel','notebook','jupyterlab']);
  const deps = (meta.softwareRequirements || []).map(d => {
    if (typeof d === 'string') return d;
    const v = d.version || '';
    return d.name + (v && !/^[><=!]/.test(v) ? `==${v}` : v);
  }).filter(d => d && !skip.has(d.split(/[><=!]/)[0].toLowerCase()));

  const pipList = deps.map(d => `          - "${d}"`).join('
') || '          - "notebook"';

  const repoTask = repo && repo.includes('github.com') ? `
    - name: Clone source repository
      ansible.builtin.git:
        repo: "${repo}"
        dest: "~/research/${safe}/source"
        version: HEAD
        force: yes
` : '';

  return `---
# Ansible playbook auto-generated from codemeta.json
# Tool    : ${name}
# Version : ${version}
# Language: ${lang}
# Desc    : ${desc}
#
# Run with: ansible-playbook playbook.yml

- name: Provision research environment for ${name}
  hosts: localhost
  connection: local
  gather_facts: yes
  become: no

  vars:
    tool_name: "${name}"
    tool_version: "${version}"
    work_dir: "~/research/${safe}"

  tasks:

    - name: Check Python version
      ansible.builtin.command: python3 --version
      register: py_ver
      changed_when: false

    - name: Show Python version
      ansible.builtin.debug:
        msg: "Found {{ py_ver.stdout }}"

    - name: Create working directory
      ansible.builtin.file:
        path: "{{ work_dir }}"
        state: directory
        mode: "0755"

    - name: Install declared dependencies
      ansible.builtin.pip:
        name:
${pipList}
        state: present
${repoTask}
    - name: Install Jupyter
      ansible.builtin.pip:
        name:
          - "jupyter"
          - "notebook"
        state: present

    - name: Environment ready
      ansible.builtin.debug:
        msg:
          - "============================================"
          - " Environment ready: ${name} ${version}"
          - " Working directory : ~/research/${safe}"
          - " To launch Jupyter :"
          - "   cd ~/research/${safe}"
          - "   jupyter notebook"
          - "============================================"
`;
}
</script>
</body>
</html>
